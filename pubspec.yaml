name: life_issues_flutter
description: Bible verses for life situations
publish_to: 'none'
version: 2.0.0+24

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Functional programming
  dartz: ^0.10.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Sharing
  share_plus: ^7.2.1

  # URL Launcher
  url_launcher: ^6.2.1

  # Device Info
  device_info_plus: ^9.1.1

  # Home screen widget
  home_widget: ^0.6.0

  # Firebase (for cloud sync)
  firebase_auth: ^6.1.3
  firebase_core: ^4.3.0
  firebase_analytics: ^12.1.1
  firebase_messaging: ^16.1.0

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  flutter_secure_storage: ^10.0.0

  # Ads
  google_mobile_ads: ^5.0.0

  cached_network_image: ^3.3.1

  flutter_staggered_grid_view: ^0.7.0

  # Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1

  # Image picker (for profile picture)
  image_picker: ^1.1.2

  # Subscriptions (Qonversion instead of RevenueCat)
  qonversion_flutter: ^11.3.1

  # File system paths
  path_provider: ^2.1.2

  # HTTP & API
  dio: ^5.4.0

  # UI
  cupertino_icons: ^1.0.6

  # Utils
  timeago: ^3.6.0

  # Google Fonts
  google_fonts: ^8.0.2

  # Font Awesome Fonts
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/databases/Life_Issues.db
    - assets/images/
    - assets/icons/
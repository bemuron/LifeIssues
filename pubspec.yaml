name: life_issues_flutter
description: Bible verses for life situations
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Functional programming
  dartz: ^0.10.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Sharing
  share_plus: ^7.2.1

  # URL Launcher
  url_launcher: ^6.2.1

  # Device Info
  device_info_plus: ^9.1.1

  # Home screen widget
  home_widget: ^0.6.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/databases/Life_Issues.db